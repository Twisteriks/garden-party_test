<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Scan Invités — Garden Party</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap');
  :root { --gold: #C9A84C; --dark: #111; --cream: #faf8f3; --green: #2d7a4f; --red: #c0392b; --border: #2a2a2a; }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--dark); color: white; font-family: 'Jost', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; }

  /* HEADER */
  header { background: #000; border-bottom: 1px solid var(--gold); padding: 0.9rem 1.2rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header h1 { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--gold); font-weight: 400; }
  .header-stats { text-align: right; }
  .hstat { font-size: 0.68rem; color: #666; letter-spacing: 0.08em; text-transform: uppercase; }
  .hstat strong { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; color: var(--gold); font-weight: 400; }

  /* TABS */
  .tabs { display: flex; background: #000; border-bottom: 1px solid #222; flex-shrink: 0; }
  .tab { flex: 1; padding: 0.75rem 0.5rem; text-align: center; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; color: #555; border-bottom: 2px solid transparent; transition: all 0.2s; }
  .tab.active { color: var(--gold); border-color: var(--gold); }

  /* PANELS */
  .panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .panel.active { display: flex; }

  /* ── SCAN ── */
  #scan-panel { background: #000; }
  .camera-wrap { position: relative; width: 100%; max-width: 500px; margin: 0 auto; aspect-ratio: 1; background: #0a0a0a; overflow: hidden; flex-shrink: 0; }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
  .scan-frame { width: 58%; aspect-ratio: 1; border: 2px solid var(--gold); border-radius: 4px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.55); position: relative; }
  .scan-line { position: absolute; left: 0; right: 0; top: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scanline 2.2s ease-in-out infinite; }
  @keyframes scanline { 0%,100%{top:0;opacity:0} 10%{opacity:1} 50%{top:calc(100% - 2px)} 90%{opacity:1} }
  .corner { position: absolute; width: 14px; height: 14px; border-color: var(--gold); border-style: solid; }
  .c-tl{top:-2px;left:-2px;border-width:3px 0 0 3px} .c-tr{top:-2px;right:-2px;border-width:3px 3px 0 0}
  .c-bl{bottom:-2px;left:-2px;border-width:0 0 3px 3px} .c-br{bottom:-2px;right:-2px;border-width:0 3px 3px 0}
  .scan-hint { text-align: center; padding: 0.6rem; font-size: 0.72rem; color: #444; letter-spacing: 0.1em; flex-shrink: 0; }

  /* RESULT CARD */
  #result-card { margin: 0 0.8rem 0.5rem; border-radius: 4px; padding: 1rem 1.3rem; display: none; animation: slideUp 0.25s ease; flex-shrink: 0; }
  @keyframes slideUp { from{transform:translateY(16px);opacity:0} to{transform:none;opacity:1} }
  #result-card.found { background: rgba(45,122,79,0.18); border: 1px solid var(--green); }
  #result-card.not-found { background: rgba(192,57,43,0.18); border: 1px solid var(--red); }
  #result-card.already { background: rgba(201,168,76,0.1); border: 1px solid var(--gold); }
  .res-top { display: flex; align-items: flex-start; gap: 0.8rem; }
  .res-icon { font-size: 1.8rem; line-height: 1; flex-shrink: 0; }
  .res-body { flex: 1; }
  .res-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 600; line-height: 1.1; }
  .res-meta { font-size: 0.78rem; color: #aaa; margin-top: 0.2rem; }
  .res-id { font-size: 0.65rem; color: #555; font-family: monospace; margin-top: 0.3rem; }

  /* ACCOMP ZONE */
  .accomp-zone { margin-top: 0.8rem; background: rgba(255,255,255,0.05); border-radius: 4px; padding: 0.7rem 0.9rem; }
  .accomp-label { font-size: 0.72rem; color: #888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .accomp-counter { display: flex; align-items: center; gap: 0.8rem; }
  .counter-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #444; background: transparent; color: white; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .counter-btn:active { background: #333; }
  .counter-val { font-family: 'Cormorant Garamond', serif; font-size: 2rem; color: var(--gold); min-width: 2rem; text-align: center; }
  .counter-max { font-size: 0.72rem; color: #555; }
  .accomp-confirm { margin-top: 0.6rem; width: 100%; padding: 0.6rem; background: var(--green); color: white; border: none; font-family: 'Jost', sans-serif; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; }

  /* BADGE */
  .res-badge { display: inline-block; padding: 0.18rem 0.7rem; border-radius: 2px; font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 0.5rem; }
  .badge-green { background: var(--green); }
  .badge-red { background: var(--red); }
  .badge-gold { background: var(--gold); color: var(--dark); }

  /* MANUAL SEARCH */
  .manual-search { padding: 0.7rem 0.8rem; border-top: 1px solid #1a1a1a; background: #080808; flex-shrink: 0; }
  .search-label { font-size: 0.68rem; color: #555; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.4rem; }
  .search-row { display: flex; gap: 0.5rem; }
  .search-row input { flex: 1; background: #181818; border: 1px solid #2a2a2a; color: white; padding: 0.6rem 0.8rem; font-family: 'Jost', sans-serif; font-size: 0.85rem; border-radius: 2px; }
  .search-row input:focus { outline: none; border-color: var(--gold); }
  .search-row input::placeholder { color: #444; }
  .search-suggestions { margin-top: 0.4rem; display: flex; flex-direction: column; gap: 0.3rem; max-height: 110px; overflow-y: auto; }
  .suggestion { padding: 0.5rem 0.8rem; background: #141414; border: 1px solid #2a2a2a; border-radius: 2px; font-size: 0.82rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .suggestion:active { background: #222; }
  .suggestion .sug-name { color: white; }
  .suggestion .sug-id { font-size: 0.68rem; color: #555; font-family: monospace; }
  .suggestion .sug-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; flex-shrink: 0; }
  .suggestion .sug-dot.present { background: var(--green); }
  .btn-sm { background: var(--gold); color: var(--dark); border: none; padding: 0.6rem 1rem; font-size: 0.78rem; font-family: 'Jost', sans-serif; font-weight: 500; letter-spacing: 0.08em; cursor: pointer; border-radius: 2px; white-space: nowrap; }

  /* ── LIST ── */
  #list-panel { background: var(--dark); }
  .list-header { padding: 0.8rem 1rem; background: #0a0a0a; border-bottom: 1px solid #1a1a1a; display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
  .filter-btn { padding: 0.3rem 0.8rem; border: 1px solid #2a2a2a; background: transparent; color: #666; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; border-radius: 2px; font-family: 'Jost', sans-serif; }
  .filter-btn.active { border-color: var(--gold); color: var(--gold); }
  .list-search { flex: 1; min-width: 120px; background: #181818; border: 1px solid #2a2a2a; color: white; padding: 0.3rem 0.7rem; font-family: 'Jost', sans-serif; font-size: 0.8rem; border-radius: 2px; }
  .list-search:focus { outline: none; border-color: var(--gold); }
  .list-search::placeholder { color: #444; }
  .guest-list { flex: 1; overflow-y: auto; }
  .guest-item { display: flex; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid #161616; gap: 0.8rem; cursor: pointer; }
  .guest-item:active { background: #1a1a1a; }
  .guest-dot { width: 9px; height: 9px; border-radius: 50%; background: #2a2a2a; flex-shrink: 0; }
  .guest-dot.present { background: var(--green); }
  .guest-info { flex: 1; min-width: 0; }
  .guest-name { font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .guest-sub { font-size: 0.68rem; color: #555; margin-top: 0.1rem; }
  .guest-right { text-align: right; flex-shrink: 0; }
  .guest-time { font-size: 0.68rem; color: #444; }
  .guest-accomp { font-size: 0.65rem; color: #666; margin-top: 0.15rem; }
  .export-bar { padding: 0.8rem; background: #0a0a0a; border-top: 1px solid #1a1a1a; flex-shrink: 0; }

  /* ── SETUP ── */
  #setup-panel { background: var(--dark); padding: 1.2rem; overflow-y: auto; }
  .setup-section { margin-bottom: 2rem; }
  .setup-section h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; color: var(--gold); border-bottom: 1px solid #222; padding-bottom: 0.5rem; margin-bottom: 1rem; font-weight: 400; }
  .upload-btn-label { display: block; width: 100%; padding: 1.2rem; border: 2px dashed #333; background: transparent; color: #888; font-family: 'Jost', sans-serif; font-size: 0.85rem; text-align: center; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
  .upload-btn-label:hover { border-color: var(--gold); color: var(--gold); }
  .file-status { margin-top: 0.6rem; font-size: 0.78rem; color: #555; text-align: center; }
  .file-status.ok { color: #4CAF50; }
  .field-map { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1rem; }
  .field-row { display: flex; align-items: center; gap: 0.7rem; }
  .field-label { font-size: 0.72rem; color: #777; width: 100px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.08em; }
  .field-row select { flex: 1; background: #181818; border: 1px solid #2a2a2a; color: white; padding: 0.5rem 0.7rem; font-family: 'Jost', sans-serif; font-size: 0.82rem; border-radius: 2px; }
  .btn-full { display: block; width: 100%; padding: 0.9rem; background: var(--gold); color: var(--dark); border: none; font-family: 'Jost', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-radius: 2px; margin-top: 0.8rem; }
  .btn-full.dark { background: var(--dark); color: var(--gold); border: 1px solid #333; }

  /* TOAST */
  #toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(16px); background: #222; color: white; padding: 0.55rem 1.2rem; border-radius: 20px; font-size: 0.78rem; opacity: 0; transition: all 0.25s; pointer-events: none; white-space: nowrap; z-index: 999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <h1>✦ Accueil Invités</h1>
  </div>
  <div class="header-stats">
    <div class="hstat">Présents <strong id="h-present">0</strong></div>
    <div class="hstat">Personnes <strong id="h-persons">0</strong> / <strong id="h-total-p">0</strong></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('scan')">📷 Scanner</div>
  <div class="tab" onclick="showTab('list')">📋 Liste</div>
  <div class="tab" onclick="showTab('setup')">⚙️ Config</div>
</div>

<!-- SCAN PANEL -->
<div id="scan-panel" class="panel active">
  <div class="camera-wrap">
    <video id="video" playsinline muted autoplay></video>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="scan-line"></div>
        <div class="corner c-tl"></div><div class="corner c-tr"></div>
        <div class="corner c-bl"></div><div class="corner c-br"></div>
      </div>
    </div>
  </div>
  <div class="scan-hint">Pointez la caméra vers le QR code de l'invitation</div>

  <div id="result-card">
    <div class="res-top">
      <div class="res-icon" id="res-icon">✓</div>
      <div class="res-body">
        <div class="res-name" id="res-name">—</div>
        <div class="res-meta" id="res-meta"></div>
        <div class="res-id" id="res-id"></div>
        <div class="res-badge" id="res-badge"></div>
      </div>
    </div>
    <!-- Accompagnants zone -->
    <div class="accomp-zone" id="accomp-zone" style="display:none">
      <div class="accomp-label">Accompagnants présents</div>
      <div class="accomp-counter">
        <button class="counter-btn" onclick="adjustAccomp(-1)">−</button>
        <div class="counter-val" id="accomp-val">0</div>
        <button class="counter-btn" onclick="adjustAccomp(1)">+</button>
        <div class="counter-max" id="accomp-max"></div>
      </div>
      <button class="accomp-confirm" onclick="confirmAccomp()">✓ Confirmer l'entrée</button>
    </div>
  </div>

  <div class="manual-search">
    <div class="search-label">Recherche manuelle</div>
    <div class="search-row">
      <input type="text" id="manual-input" placeholder="Nom, prénom ou ID…" autocomplete="off" oninput="updateSuggestions()">
      <button class="btn-sm" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-suggestions" id="suggestions"></div>
  </div>
</div>

<!-- LIST PANEL -->
<div id="list-panel" class="panel">
  <div class="list-header">
    <button class="filter-btn active" onclick="setFilter('all',this)">Tous</button>
    <button class="filter-btn" onclick="setFilter('present',this)">Présents</button>
    <button class="filter-btn" onclick="setFilter('absent',this)">En attente</button>
    <input type="text" class="list-search" id="list-search" placeholder="Rechercher…" oninput="renderList()">
  </div>
  <div class="guest-list" id="guest-list">
    <div style="text-align:center;padding:2rem;color:#444;font-size:0.82rem">Importez votre liste dans Config</div>
  </div>
  <div class="export-bar">
    <button class="btn-full" onclick="exportResults()">↓ Exporter présences (.xlsx)</button>
  </div>
</div>

<!-- SETUP PANEL -->
<div id="setup-panel" class="panel">
  <div class="setup-section">
    <h2>1 — Liste des invités</h2>
    <label class="upload-btn-label" for="xlsxInput">
      📂 Sélectionner le fichier Excel<br>
      <small style="color:#555;font-size:0.72rem">liste_invites_reference.xlsx</small>
    </label>
    <input type="file" id="xlsxInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="loadGuestList(this)">
    <div class="file-status" id="file-status">Aucun fichier chargé</div>
    <div class="field-map" id="field-map" style="display:none">
      <div class="field-row"><span class="field-label">ID *</span><select id="col-id"></select></div>
      <div class="field-row"><span class="field-label">Prénom</span><select id="col-prenom"></select></div>
      <div class="field-row"><span class="field-label">Nom</span><select id="col-nom"></select></div>
      <div class="field-row"><span class="field-label">Accompagnants</span><select id="col-accomp"></select></div>
    </div>
    <button class="btn-full" id="apply-btn" style="display:none" onclick="applyMapping()">Valider la configuration</button>
  </div>
  <div class="setup-section">
    <h2>2 — Caméra</h2>
    <button class="btn-full" onclick="startCamera()">Activer la caméra</button>
    <button class="btn-full dark" style="margin-top:0.5rem" onclick="stopCamera()">Arrêter la caméra</button>
  </div>
</div>

<div id="toast"></div>
<canvas id="canvas" style="display:none"></canvas>

<script>
// ── STATE ─────────────────────────────────
let guests = [];
let rawData = [];
let currentFilter = 'all';
let scanning = false;
let scanCooldown = false;
let stream = null;
let pendingGuest = null;  // guest waiting for accomp confirmation
let pendingAccomp = 0;

// ── TABS ──────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['scan','list','setup'][i] === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(name+'-panel').classList.add('active');
}

// ── LOAD GUEST LIST ───────────────────────
function loadGuestList(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const wb = XLSX.read(e.target.result, { type:'binary' });
    rawData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    if (!rawData.length) { showToast('Fichier vide !'); return; }

    const cols = Object.keys(rawData[0]);
    const guess = pats => cols.find(c => pats.some(p => p.test(c.trim()))) || '';

    const defaults = [
      guess([/^id$/i]) || cols[0],
      guess([/pr[eé]nom/i, /first/i]),
      guess([/^nom$/i, /last/i, /surname/i]),
      guess([/accomp/i, /\+1/i, /guest/i])
    ];

    ['col-id','col-prenom','col-nom','col-accomp'].forEach((selId, i) => {
      const sel = document.getElementById(selId);
      sel.innerHTML = '<option value="">— aucun —</option>' + cols.map(c =>
        `<option value="${c}" ${c === defaults[i] ? 'selected':''}>${c}</option>`
      ).join('');
    });

    document.getElementById('field-map').style.display = 'flex';
    document.getElementById('apply-btn').style.display = 'block';
    document.getElementById('file-status').textContent = `✓ ${rawData.length} lignes — ${file.name}`;
    document.getElementById('file-status').className = 'file-status ok';
  };
  reader.readAsBinaryString(file);
}

function applyMapping() {
  const idCol     = document.getElementById('col-id').value;
  const prenomCol = document.getElementById('col-prenom').value;
  const nomCol    = document.getElementById('col-nom').value;
  const accompCol = document.getElementById('col-accomp').value;
  if (!idCol) { showToast('Sélectionnez la colonne ID'); return; }

  guests = rawData.map((row, i) => ({
    id:          String(row[idCol] || `INV-${i}`).trim(),
    prenom:      prenomCol ? String(row[prenomCol] || '').trim() : '',
    nom:         nomCol    ? String(row[nomCol]    || '').trim() : '',
    accompMax:   accompCol ? (parseInt(row[accompCol]) || 0) : 0,
    accompPres:  0,
    present:     false,
    time:        null
  }));

  updateHeader();
  renderList();
  showToast(`${guests.length} invités chargés ✓`);
  showTab('scan');
}

// ── CAMERA ────────────────────────────────
let scanInterval = null;
let barcodeDetector = null;

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }

    // BarcodeDetector = API native Android Chrome 83+, bien plus fiable
    if ('BarcodeDetector' in window) {
      barcodeDetector = new BarcodeDetector({ formats: ['qr_code'] });
    } else {
      barcodeDetector = null;
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js');
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });

    const video = document.getElementById('video');
    video.srcObject = stream;
    video.setAttribute('playsinline', true);
    await video.play();

    scanning = true;
    scanInterval = setInterval(scanFrame, 300);
    showToast(barcodeDetector ? 'Caméra activée ✓' : 'Caméra activée (compat.) ✓');
    showTab('scan');
  } catch(e) {
    console.error(e);
    showToast('Erreur : ' + e.message);
  }
}

function stopCamera() {
  scanning = false;
  if (scanInterval) { clearInterval(scanInterval); scanInterval = null; }
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  showToast('Caméra arrêtée');
}

async function scanFrame() {
  if (!scanning || scanCooldown) return;
  const video = document.getElementById('video');
  if (!video.srcObject || video.readyState !== video.HAVE_ENOUGH_DATA) return;
  try {
    if (barcodeDetector) {
      // API native — délègue au moteur QR du téléphone
      const codes = await barcodeDetector.detect(video);
      if (codes.length > 0) handleScan(codes[0].rawValue.trim());
    } else if (typeof jsQR !== 'undefined') {
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      canvas.width = 480;
      canvas.height = Math.round(480 / (video.videoWidth / video.videoHeight));
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });
      if (code && code.data) handleScan(code.data.trim());
    }
  } catch(e) { /* scan silencieux */ }
}

// ── SCAN LOGIC ────────────────────────────
function handleScan(scannedId) {
  scanCooldown = true;
  setTimeout(() => { scanCooldown = false; }, 3000);

  clearSearch();
  const card = document.getElementById('result-card');
  card.style.display = 'block';
  card.className = '';

  const guest = guests.find(g => g.id === scannedId);

  if (!guest) {
    showResult('not-found', '✗', 'Invité introuvable', 'Ce code n\'est pas dans la liste', `Code : ${scannedId}`, 'Non reconnu', 'badge-red');
    document.getElementById('accomp-zone').style.display = 'none';
    return;
  }

  if (guest.present) {
    const name = displayName(guest);
    showResult('already', '⚠', name,
      `Déjà enregistré${guest.accompPres > 0 ? ` avec ${guest.accompPres} accompagnant${guest.accompPres>1?'s':''}` : ''}`,
      `Pointé à ${guest.time}`, 'Déjà enregistré', 'badge-gold');
    document.getElementById('accomp-zone').style.display = 'none';
    if (navigator.vibrate) navigator.vibrate([50, 80, 50]);
    return;
  }

  // New guest — show result + accomp zone if needed
  showResult('found', '✓', displayName(guest), `ID : ${guest.id}`, '', 'Validé', 'badge-green');

  if (guest.accompMax > 0) {
    // Ask for how many accompagnants are actually present
    pendingGuest = guest;
    pendingAccomp = guest.accompMax; // default = all
    document.getElementById('accomp-val').textContent = pendingAccomp;
    document.getElementById('accomp-max').textContent = `/ ${guest.accompMax} max`;
    document.getElementById('accomp-zone').style.display = 'block';
    document.getElementById('res-badge').style.display = 'none';
  } else {
    document.getElementById('accomp-zone').style.display = 'none';
    confirmEntrance(guest, 0);
  }
}

function adjustAccomp(delta) {
  if (!pendingGuest) return;
  pendingAccomp = Math.max(0, Math.min(pendingGuest.accompMax, pendingAccomp + delta));
  document.getElementById('accomp-val').textContent = pendingAccomp;
}

function confirmAccomp() {
  if (!pendingGuest) return;
  confirmEntrance(pendingGuest, pendingAccomp);
  document.getElementById('accomp-zone').style.display = 'none';
  document.getElementById('res-badge').style.display = '';
}

function confirmEntrance(guest, accompPres) {
  guest.present = true;
  guest.accompPres = accompPres;
  guest.time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });

  const total = 1 + accompPres;
  const badgeText = accompPres > 0
    ? `Entrée à ${guest.time} · ${total} personnes`
    : `Entrée enregistrée à ${guest.time}`;

  document.getElementById('res-badge').textContent = badgeText;
  document.getElementById('res-badge').style.display = '';
  document.getElementById('res-meta').textContent = accompPres > 0
    ? `${accompPres} accompagnant${accompPres>1?'s':''} — ${total} personnes au total`
    : 'Invité seul';

  updateHeader();
  renderList();
  if (navigator.vibrate) navigator.vibrate([100]);
}

function showResult(cls, icon, name, meta, id, badge, badgeCls) {
  const card = document.getElementById('result-card');
  card.className = cls;
  document.getElementById('res-icon').textContent = icon;
  document.getElementById('res-name').textContent = name;
  document.getElementById('res-meta').textContent = meta;
  document.getElementById('res-id').textContent = id;
  const b = document.getElementById('res-badge');
  b.textContent = badge;
  b.className = 'res-badge ' + badgeCls;
  b.style.display = '';
}

function displayName(g) {
  return [g.prenom, g.nom].filter(Boolean).join(' ') || g.id;
}

// ── SEARCH ────────────────────────────────
function updateSuggestions() {
  const q = document.getElementById('manual-input').value.trim().toLowerCase();
  const box = document.getElementById('suggestions');
  if (!q || q.length < 1) { box.innerHTML = ''; return; }

  const matches = guests.filter(g =>
    g.id.toLowerCase().includes(q) ||
    g.nom.toLowerCase().includes(q) ||
    g.prenom.toLowerCase().includes(q) ||
    displayName(g).toLowerCase().includes(q)
  ).slice(0, 6);

  box.innerHTML = matches.map(g => `
    <div class="suggestion" onclick="handleScan('${g.id}')">
      <div>
        <div class="sug-name">${displayName(g)}</div>
        <div class="sug-id">${g.id}${g.accompMax>0?' · +'+g.accompMax+' accomp.':''}</div>
      </div>
      <div class="sug-dot ${g.present?'present':''}"></div>
    </div>
  `).join('') || '<div style="padding:0.5rem 0.8rem;font-size:0.78rem;color:#555">Aucun résultat</div>';
}

function clearSearch() {
  document.getElementById('manual-input').value = '';
  document.getElementById('suggestions').innerHTML = '';
}

// ── LIST ──────────────────────────────────
let listFilter = 'all';
function setFilter(f, el) {
  listFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const q = (document.getElementById('list-search')?.value || '').toLowerCase();
  const container = document.getElementById('guest-list');

  let list = guests.filter(g => {
    const matchFilter = listFilter === 'all' || (listFilter === 'present' && g.present) || (listFilter === 'absent' && !g.present);
    const matchSearch = !q || displayName(g).toLowerCase().includes(q) || g.id.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  }).sort((a, b) => {
    if (a.present !== b.present) return b.present - a.present;
    return displayName(a).localeCompare(displayName(b));
  });

  if (!list.length) {
    container.innerHTML = '<div style="text-align:center;padding:2rem;color:#444;font-size:0.82rem">Aucun invité</div>';
    return;
  }

  container.innerHTML = list.map(g => `
    <div class="guest-item" onclick="togglePresence('${g.id}')">
      <div class="guest-dot ${g.present?'present':''}"></div>
      <div class="guest-info">
        <div class="guest-name">${displayName(g)}</div>
        <div class="guest-sub">ID ${g.id}</div>
      </div>
      <div class="guest-right">
        <div class="guest-time">${g.time || ''}</div>
        <div class="guest-accomp">${g.accompMax > 0 ? `+${g.present ? g.accompPres : g.accompMax} accomp.` : ''}</div>
      </div>
    </div>
  `).join('');
}

function togglePresence(id) {
  const g = guests.find(x => x.id === id); if (!g) return;
  if (!g.present) {
    g.present = true;
    g.accompPres = g.accompMax;
    g.time = new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  } else {
    g.present = false; g.accompPres = 0; g.time = null;
  }
  updateHeader(); renderList();
  showToast(g.present ? `${displayName(g)} — Pointé ✓` : 'Pointage annulé');
}

// ── EXPORT ────────────────────────────────
function exportResults() {
  if (!guests.length) { showToast('Aucune donnée'); return; }
  const data = guests.map(g => ({
    ID: g.id, Prénom: g.prenom, Nom: g.nom,
    'Accompagnants prévus': g.accompMax,
    Présent: g.present ? 'Oui' : 'Non',
    'Accompagnants présents': g.present ? g.accompPres : '',
    'Total personnes': g.present ? (1 + g.accompPres) : '',
    'Heure arrivée': g.time || ''
  }));
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(data);
  ws['!cols'] = [{wch:14},{wch:16},{wch:18},{wch:20},{wch:10},{wch:22},{wch:16},{wch:16}];
  XLSX.utils.book_append_sheet(wb, ws, 'Présences');
  XLSX.writeFile(wb, `presences_${new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')}.xlsx`);
}

// ── HEADER ────────────────────────────────
function updateHeader() {
  const present = guests.filter(g => g.present).length;
  const persons = guests.filter(g => g.present).reduce((s,g) => s + 1 + g.accompPres, 0);
  const totalP  = guests.reduce((s,g) => s + 1 + g.accompMax, 0);
  document.getElementById('h-present').textContent = present;
  document.getElementById('h-persons').textContent = persons;
  document.getElementById('h-total-p').textContent = totalP;
}

// ── TOAST ─────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>
